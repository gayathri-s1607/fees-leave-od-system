<!DOCTYPE html>
<html>
<head>
    <title>Fees</title>
</head>
<body>

<h2>Fees Section</h2>

<button onclick="showReceipts()">Receipts</button>
<button onclick="showPending()">Pending</button>

<div id="result" style="margin-top:20px;"></div>

<script>
function showReceipts(){
    document.getElementById("result").innerHTML =
    "<b>Receipts:</b><br><br>Receipt 1: Paid ₹5000 <br>Receipt 2: Paid ₹3000";
}

function showPending(){
    document.getElementById("result").innerHTML =
    "<b>Pending Details:</b><br><br>College Fees: ₹50,000 <br>Hostel Rent: ₹10,000";
}
</script>

</body>
</html>
